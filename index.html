const Btn=({children,onClick,v="sec",sz="md",full,disabled})=>{

  const c=cfg[v]||cfg.sec;const bg=prs?c.bgP:hov?c.bgH:c.bg;
  const pad={sm:"8px 16px",md:"11px 22px",lg:"14px 28px"}[sz]||"11px 22px";
  const fs={sm:13,md:15,lg:16}[sz]||15;
  return <button onClick={disabled?undefined:onClick} disabled={!!disabled} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>{setHov(false);setPrs(false)}} onMouseDown={()=>setPrs(true)} onMouseUp={()=>setPrs(false)} style={{display:"inline-flex",alignItems:"center",gap:7,padding:pad,borderRadius:"var(--r-sm)",fontSize:fs,fontWeight:700,fontFamily:"inherit",cursor:disabled?"not-allowed":"pointer",border:`2px solid ${c.bdr==="transparent"?"transparent":c.bdr}`,background:bg,color:c.c,opacity:disabled?.5:1,transition:"background .14s,transform .1s",transform:prs?"scale(.97)":hov?"scale(1.01)":"scale(1)",boxShadow:hov&&!prs?c.sh:"none",width:full?"100%":undefined,justifyContent:full?"center":undefined,whiteSpace:"nowrap",userSelect:"none",minHeight:44}}>{children}</button>;

const GlobalSearch=({nav,onClose})=>{
  const[q,setQ]=useState("");
  const[sel,setSel]=useState(0);
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current&&inputRef.current.focus();},[]);
  const results=q.trim().length>0
    ? SEARCH_INDEX.filter(x=>x.label.toLowerCase().includes(q.toLowerCase())||x.desc.toLowerCase().includes(q.toLowerCase()))
    : SEARCH_INDEX;
  const handleKey=e=>{
    if(e.key==="ArrowDown"){setSel(s=>Math.min(s+1,results.length-1));e.preventDefault();}
    else if(e.key==="ArrowUp"){setSel(s=>Math.max(s-1,0));e.preventDefault();}
    else if(e.key==="Enter"&&results[sel]){nav(results[sel].id);onClose();}
    else if(e.key==="Escape"){onClose();}
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:9998,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:80,padding:"80px 20px 20px"}} onClick={onClose}>

          <span style={{fontSize:18}}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>{setQ(e.target.value);setSel(0);}} onKeyDown={handleKey} placeholder="Search pages, features, tools..." style={{flex:1,border:"none",outline:"none",fontSize:16,background:"transparent",color:"var(--tx1)",fontFamily:"inherit"}} aria-label="Search"/>
          <button onClick={onClose} style={{background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:"var(--r-xs)",padding:"3px 9px",cursor:"pointer",fontSize:13,color:"var(--tx5)",fontFamily:"inherit"}}>Esc</button>
        </div>
        <div style={{maxHeight:400,overflowY:"auto"}}>
          {results.length===0&&<div style={{padding:"28px 20px",textAlign:"center",color:"var(--tx5)",fontSize:15}}>No results for "{q}"</div>}
          {results.map((r,i)=>(
            <div key={r.id} onClick={()=>{nav(r.id);onClose();}} onMouseEnter={()=>setSel(i)}
              style={{display:"flex",alignItems:"center",gap:13,padding:"12px 18px",cursor:"pointer",background:sel===i?"var(--teal-ltt)":"transparent",borderLeft:`3px solid ${sel===i?"var(--teal)":"transparent"}`,transition:"background .1s"}}>

                <div style={{fontSize:12.5,color:"var(--tx5)"}}>{r.desc}</div>
              </div>
              {sel===i&&<span style={{fontSize:12,color:"var(--teal)",fontWeight:700}}>Enter ↵</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"10px 18px",borderTop:"1px solid var(--bdr)",display:"flex",gap:16,fontSize:12,color:"var(--tx5)"}}>

          <span style={{marginLeft:"auto"}}>{results.length} results</span>
        </div>
      </div>
    </div>

  school_dash:{label:"School District",parent:"coordinator"},
  analytics:{label:"Analytics",parent:"coordinator"},
  impact:{label:"Impact Report",parent:"analytics"},
};

const Breadcrumb=({page,nav})=>{
  const buildCrumbs=(p)=>{
    const crumbs=[];
    let current=p;
    while(current&&PAGE_META[current]){
      crumbs.unshift({id:current,...PAGE_META[current]});
      current=PAGE_META[current].parent;
    }
    if(crumbs.length===0||crumbs[0].id!=="home") crumbs.unshift({id:"home",label:"Home",parent:null});
    return crumbs;
  };
  const crumbs=buildCrumbs(page);
  if(crumbs.length<=1) return null;
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 32px",background:"var(--card)",borderBottom:"1px solid var(--bdr-lt)",fontSize:13,color:"var(--tx5)",flexShrink:0}}>
      {crumbs.map((c,i)=>(
        <React.Fragment key={c.id}>
          {i>0&&<span style={{color:"var(--bdr)",fontSize:14}}>›</span>}
          {i<crumbs.length-1
            ? <button onClick={()=>nav(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--teal)",fontWeight:600,fontSize:13,fontFamily:"inherit",padding:"2px 4px",borderRadius:"var(--r-xs)"}} onMouseEnter={e=>e.target.style.textDecoration="underline"} onMouseLeave={e=>e.target.style.textDecoration="none"}>{c.label}</button>
            : <span style={{color:"var(--tx3)",fontWeight:700}}>{c.label}</span>
          }
        </React.Fragment>
      ))}
    </div>
  );
};

  return(
    <div className="pg">

                    <Badge v={p.slots>2?"green":p.slots>0?"amber":"red"} xs>{p.slots>0?`${p.slots} open slots`:"Waitlist"}</Badge>

                <Btn v="pri" full onClick={()=>alert(`Referral sent to ${p.name}. Care coordinator will review.`)}>Select this provider</Btn>
              </div>
              <Btn v="ghost" full onClick={()=>setSelected(null)} style={{marginTop:8}}>← Back to list</Btn>
            </Card>
          );
        })()}
      </div>
    </div>
  );
};

// I — MORE SCREENINGS (PHQ-A, GAD-7, CRAFFT)
// ══════════════════════════════════════════════════════════
const MoreScreeningsPage=()=>{
  const[active,setActive]=useState("phqa");
  const[answers,setAnswers]=useState({});
  const[done,setDone]=useState(false);

  const screenings={
    phqa:{
      name:"PHQ-A (Teen Depression)",color:"#1D4ED8",bg:"#EFF6FF",
      intro:"The Patient Health Questionnaire for Adolescents screens for depressive symptoms over the past 2 weeks.",
      scale:["Not at all (0)","Several days (1)","More than half the days (2)","Nearly every day (3)"],
      questions:[
        "Little interest or pleasure in doing things",
        "Feeling down, depressed, irritable, or hopeless",
        "Trouble falling or staying asleep, or sleeping too much",
        "Feeling tired or having little energy",
        "Poor appetite or overeating",
        "Feeling bad about yourself — or that you are a failure or have let yourself or your family down",
        "Trouble concentrating on things, such as reading or watching television",
        "Moving or speaking so slowly that other people could have noticed. Or the opposite — being so fidgety or restless that you have been moving around a lot more than usual",
        "Thoughts that you would be better off dead, or thoughts of hurting yourself in some way",
      ],
      scoreGuide:[["0–4","Minimal"],["5–9","Mild"],["10–14","Moderate"],["15–19","Moderately Severe"],["20–27","Severe"]],
    },
    gad7:{
      name:"GAD-7 (Anxiety)",color:"#0C7A6A",bg:"#EDFAF6",
      intro:"The Generalized Anxiety Disorder 7-item scale measures anxiety symptom severity over the past 2 weeks.",
      scale:["Not at all (0)","Several days (1)","More than half the days (2)","Nearly every day (3)"],
      questions:[
        "Feeling nervous, anxious, or on edge",
        "Not being able to stop or control worrying",
        "Worrying too much about different things",
        "Trouble relaxing",
        "Being so restless that it is hard to sit still",
        "Becoming easily annoyed or irritable",
        "Feeling afraid, as if something awful might happen",
      ],
      scoreGuide:[["0–4","Minimal anxiety"],["5–9","Mild anxiety"],["10–14","Moderate anxiety"],["15–21","Severe anxiety"]],
    },
    crafft:{
      name:"CRAFFT (Substance Use)",color:"#92400E",bg:"#FFFBEB",
      intro:"The CRAFFT screening tool assesses substance use risk in adolescents ages 12–18.",
      scale:["No (0)","Yes (1)"],
      questions:[
        "Have you ever ridden in a CAR driven by someone (including yourself) who was high or had been using alcohol or drugs?",
        "Do you ever use alcohol or drugs to RELAX, feel better about yourself, or fit in?",
        "Do you ever use alcohol or drugs while you are by yourself, ALONE?",
        "Do you ever FORGET things you did while using alcohol or drugs?",
        "Do your FAMILY or FRIENDS ever tell you that you should cut down on your drinking or drug use?",
        "Have you ever gotten into TROUBLE while you were using alcohol or drugs?",
      ],
      scoreGuide:[["0","No risk"],["1","Low risk — brief counseling"],["2+","High risk — further assessment needed"]],
    },
  };

  const s=screenings[active];
  const total=Object.values(answers).reduce((sum,v)=>sum+(v||0),0);

  return(
    <div className="pg">
      <EW>Additional Clinical Screenings — Licensed Professionals Only</EW>
      <h1 style={{fontSize:28,fontWeight:900,marginBottom:6}}>🧠 More screening tools</h1>
      <p style={{fontSize:15,color:"var(--tx4)",marginBottom:18}}>PHQ-A (depression), GAD-7 (anxiety), and CRAFFT (substance use) screening tools. All must be administered by licensed professionals.</p>
      <Alert type="danger" style={{marginBottom:18}}>For licensed professional use only. Not a self-assessment tool.</Alert>

      <div style={{display:"flex",gap:10,marginBottom:22,flexWrap:"wrap"}}>
        {Object.entries(screenings).map(([k,sc])=>(
          <button key={k} onClick={()=>{setActive(k);setAnswers({});setDone(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 20px",borderRadius:"var(--r-sm)",border:`2px solid ${active===k?sc.color:"var(--bdr)"}`,background:active===k?sc.bg:"var(--card)",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:14,color:active===k?sc.color:"var(--tx2)",transition:"all .15s",minHeight:44}}>
            {sc.name}
          </button>
        ))}
      </div>

      {done?(
        <Card sx={{maxWidth:500,margin:"0 auto",textAlign:"center",padding:"48px 44px"}}>
          <div style={{fontSize:50,marginBottom:16}}>📊</div>
          <h2 style={{fontSize:22,fontWeight:900,marginBottom:10}}>{s.name} Complete</h2>
          <div style={{fontSize:36,fontWeight:900,color:s.color,marginBottom:8}}>{total}</div>
          <div style={{marginBottom:16}}>
            {s.scoreGuide.map(([range,label])=>{
              const[lo,hi]=range.split("–").map(Number);
              const inRange=hi?total>=lo&&total<=hi:total>=lo;
              return inRange?<Badge key={range} v={total<=4?"green":total<=9?"amber":"red"}>{range}: {label}</Badge>:null;
            })}
          </div>
          <div style={{display:"flex",gap:9,justifyContent:"center"}}>
            <Btn v="pri" onClick={()=>{setAnswers({});setDone(false);}}>Screen again</Btn>
            <Btn v="sec">Export to EHR</Btn>
          </div>
        </Card>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:22}}>
          <Card>
            <div style={{padding:"14px 16px",borderRadius:"var(--r-sm)",background:s.bg,marginBottom:18}}>
              <div style={{fontSize:14,fontWeight:800,color:s.color,marginBottom:4}}>{s.name}</div>
              <div style={{fontSize:13.5,color:"var(--tx3)"}}>{s.intro}</div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:"var(--tx4)",marginBottom:12}}>Scale: {s.scale.join(" · ")}</div>
            {s.questions.map((q,i)=>(
              <div key={i} style={{padding:"14px 16px",borderRadius:"var(--r-sm)",border:`1.5px solid ${answers[i]!=null?"var(--teal)":"var(--bdr)"}`,background:answers[i]!=null?s.bg:"var(--card)",marginBottom:10}}>
                <div style={{fontSize:14,color:"var(--tx2)",marginBottom:10,lineHeight:1.5}}><strong>{i+1}.</strong> {q}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {s.scale.map((opt,val)=>(
                    <button key={val} onClick={()=>setAnswers(a=>({...a,[i]:val}))} style={{padding:"6px 12px",borderRadius:"var(--r-sm)",border:`2px solid ${answers[i]===val?s.color:"var(--bdr)"}`,background:answers[i]===val?s.bg:"var(--card)",color:answers[i]===val?s.color:"var(--tx3)",fontSize:12.5,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .13s"}}>{opt}</button>
                  ))}
                </div>
              </div>
            ))}
            <Btn v="pri" full sz="lg" onClick={()=>{if(Object.keys(answers).length<s.questions.length)return alert("Please answer all questions.");setDone(true);}}>Submit screening →</Btn>
          </Card>
          <Card sx={{position:"sticky",top:16,alignSelf:"flex-start"}}>

};

const SessionNotesPage=()=>{

    if(!startTime||!endTime)return "—";
    const[sh,sm]=startTime.split(":").map(Number);

    const mins=(eh*60+em)-(sh*60+sm);

    return `${mins} min (${(mins/60).toFixed(2)} hrs)`;
  };

FORMAT: Telehealth (Zoom — HIPAA-compliant)

MEDICAID BILLING NOTE:

          {title:"Listen without judgment",desc:"Don't minimize ("You have so much to be grateful for") or problem-solve right away. Just listen."},
          {title:"Remove access to means",desc:"Quietly secure medications, sharp objects, and firearms if there is any safety concern."},
          {title:"Call 988 together",desc:"You can call 988 together with your child. You can also call on their behalf if they won't call themselves."},
          {title:"If in immediate danger: call 911",desc:"Tell the dispatcher your child is experiencing a mental health crisis. Request a mental health co-responder if available."},
        ].map((t,i)=>(

          <div style={{fontSize:13.5,color:"rgba(255,255,255,.9)"}}>Call or text <strong>988</strong> · Text HOME to <strong>741741</strong> · Call <strong>911</strong></div>
        </div>
      </Card>

      <Card sx={{background:"#ECFDF5",border:"2px solid #6EE7B7"}}>

          {do:""I may not understand everything, but I want to try."",why:"Acknowledges the gap while showing willingness."},

          [""Just cheer up / snap out of it"","Implies they can control it — they can't. Mental illness is not a choice."],
          [""You have nothing to be sad about"","Invalidates their experience and shuts down conversation."],

      </div>
    </div>

    <Alert type="danger">🚨 <strong>If your child is in immediate danger:</strong> Call <strong>911</strong> or go to your nearest emergency room. Tell them it is a psychiatric emergency. You can also call <strong>988</strong> for guidance on how to safely help your child.</Alert>

const QuickReferralPage=()=>{

  if(done) return(
    <div className="pg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:460}}>
      <Card sx={{maxWidth:480,textAlign:"center",padding:"52px 44px"}}>

        <div style={{marginBottom:16}}><Badge v={form.urgent?"red":"teal"}>{form.urgent?"🔴 Urgent — 48 hr response":"✓ Routine — 5 day response"}</Badge></div>
        <p style={{color:"var(--tx4)",marginBottom:20,lineHeight:1.65}}>Referral ID: <strong>EC-2025-{Math.floor(Math.random()*100+500)}</strong><br/>A care coordinator will contact you by end of business day.</p>
        <Alert type="success">Confirmation sent to your school email. Full details can be added later in the complete referral form.</Alert>

        <div style={{display:"flex",gap:9}}>
          <Btn v="pri" full onClick={()=>{setDone(false);setStep(1);setForm({name:"",grade:"",concern:"",urgent:false,consent:"verbal"});}}>Submit another</Btn>
        </div>
      </Card>
    </div>
  );
  return(
    <div className="pg">
      <EW>School Counselor — Quick Referral</EW>
      <h1 style={{fontSize:28,fontWeight:900,marginBottom:6}}>⚡ Quick referral — 60 seconds</h1>
      <p style={{fontSize:15,color:"var(--tx4)",marginBottom:18}}>3 steps. Submit a referral in under a minute. Full details can be added later. For complex cases use the <strong>Full Referral Form</strong>.</p>

      <div style={{maxWidth:580,margin:"0 auto"}}>
        {/* Step indicator */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:28}}>
          {[{n:1,l:"Student"},{n:2,l:"Concern"},{n:3,l:"Consent"}].map((s,i)=>(
            <React.Fragment key={s.n}>
              {i>0&&<div style={{flex:1,height:2,background:step>s.n?"var(--teal)":"var(--bdr)"}}/>}

                <div style={{fontSize:11,fontWeight:700,color:step>=s.n?"var(--teal)":"var(--tx5)"}}>{s.l}</div>

            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. J.T. or Jordan T." style={{...iSt,marginBottom:16}} onFocus={iFoc} onBlur={iBlr}/>

              {["6th","7th","8th","9th","10th","11th","12th"].map(g=>(

            </label>
            <Btn v="pri" full sz="lg" disabled={!form.name} onClick={()=>setStep(2)}>Next — add concern →</Btn>

        {step===2&&(
          <Card>
            <h2 style={{fontSize:17,fontWeight:800,marginBottom:20}}>Step 2 — What is the concern?</h2>
            <p style={{fontSize:14,color:"var(--tx4)",marginBottom:14}}>Select the primary concern. You can add more detail after submission.</p>

        {step===3&&(
          <Card>
            <h2 style={{fontSize:17,fontWeight:800,marginBottom:20}}>Step 3 — Confirm consent</h2>

              <div style={{fontSize:14,color:form.urgent?"#B91C1C":"var(--green)",fontWeight:700}}>{form.urgent?"🔴 Urgent — 48 hr response needed":"✓ Routine — 5 business day response"}</div>
            </div>
            <div style={{marginBottom:18}}>
              {[{v:"verbal",t:"Parent/guardian verbal consent obtained",d:"Written consent will follow within 5 business days"},{v:"written",t:"Written consent on file",d:"Signed form in student record"},{v:"emergency",t:"Emergency exception",d:"Imminent safety concern — FERPA emergency exception applies"}].map(c=>(

              <Btn v="pri" full sz="lg" onClick={()=>setDone(true)}>⚡ Submit quick referral</Btn>
            </div>
          </Card>
        )}
      </div>
    </div>
  );

// REC 13 — PROVIDER AVAILABILITY CALENDAR
// ══════════════════════════════════════════════════════════
const AvailabilityCalendarPage=()=>{
  const[selectedProvider,setSelectedProvider]=useState(1);
  const[selectedSlot,setSelectedSlot]=useState(null);
  const[booked,setBooked]=useState(false);

  const CALENDAR_SLOTS={
    1:[
      {date:"Mon May 26",slots:["9:00 AM","10:30 AM","2:00 PM","3:30 PM"]},
      {date:"Tue May 27",slots:["9:00 AM","11:00 AM","1:00 PM"]},
      {date:"Wed May 28",slots:["10:00 AM","2:30 PM","4:00 PM"]},
      {date:"Thu May 29",slots:["9:30 AM","11:00 AM","3:00 PM","4:30 PM"]},
      {date:"Fri May 30",slots:["9:00 AM","10:00 AM"]},
    ],
    2:[
      {date:"Mon May 26",slots:["3:30 PM"]},
      {date:"Wed May 28",slots:["2:00 PM","3:30 PM"]},
      {date:"Fri May 30",slots:["11:00 AM"]},
    ],
    3:[
      {date:"Mon May 26",slots:["9:00 AM","10:00 AM","11:00 AM","1:00 PM","2:00 PM","3:00 PM","4:00 PM"]},
      {date:"Tue May 27",slots:["9:00 AM","10:00 AM","11:00 AM","1:00 PM","2:00 PM"]},
      {date:"Wed May 28",slots:["9:00 AM","10:00 AM","1:00 PM","2:00 PM","3:00 PM"]},
    ],
  };

  const providerSlots=CALENDAR_SLOTS[selectedProvider]||[];
  const providers=[
    {id:1,name:"Fictional Provider — Dr. Marcus Williams",spec:"Anxiety · CBT",wait:"< 1 week",medicaid:true},
    {id:2,name:"Fictional Provider — Sarah Chen, LPC-A",spec:"Trauma · DBT",wait:"< 1 week",medicaid:true},
    {id:3,name:"Fictional Provider — JCBH Youth Services",spec:"General BH",wait:"This week",medicaid:true},
  ];

  return(
    <div className="pg">
      <EW>Provider Availability Calendar</EW>
      <h1 style={{fontSize:28,fontWeight:900,marginBottom:6}}>📆 Provider availability calendar</h1>
      <p style={{fontSize:15,color:"var(--tx4)",marginBottom:20}}>Real-time availability for matched providers. Select a provider and open time slot to request an appointment. All shown providers accept Alabama Medicaid / ALL Kids.</p>

      {/* Provider selector */}
      <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
        {providers.map(p=>(
          <button key={p.id} onClick={()=>{setSelectedProvider(p.id);setSelectedSlot(null);}} style={{padding:"12px 18px",borderRadius:"var(--r)",border:`2px solid ${selectedProvider===p.id?"var(--teal)":"var(--bdr)"}`,background:selectedProvider===p.id?"#EDFAF6":"var(--card)",cursor:"pointer",fontFamily:"inherit",textAlign:"left",transition:"all .15s",minWidth:200}}>
            <div style={{fontSize:14,fontWeight:800,color:selectedProvider===p.id?"var(--teal-h)":"var(--tx1)",marginBottom:3}}>{p.name.replace("Fictional Provider — ","")}</div>
            <div style={{fontSize:12.5,color:"var(--tx5)",marginBottom:4}}>{p.spec}</div>
            <div style={{display:"flex",gap:6}}>
              <Badge v="green" xs>Medicaid ✓</Badge>
              <Badge v="teal" xs>Wait: {p.wait}</Badge>
            </div>
          </button>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:22}}>
        <Card>
          <h2 style={{fontSize:16,fontWeight:800,marginBottom:18}}>Available slots — week of May 26</h2>
          {providerSlots.map(day=>(
            <div key={day.date} style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:800,textTransform:"uppercase",letterSpacing:".07em",color:"var(--tx5)",marginBottom:10}}>{day.date}</div>
              <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
                {day.slots.map(slot=>{
                  const key=`${day.date}-${slot}`;
                  const isSelected=selectedSlot===key;
                  return(
                    <button key={slot} onClick={()=>setSelectedSlot(isSelected?null:key)} style={{padding:"8px 16px",borderRadius:99,border:`2px solid ${isSelected?"var(--teal)":"var(--bdr)"}`,background:isSelected?"var(--teal)":"var(--card)",color:isSelected?"white":"var(--tx2)",fontSize:13.5,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .14s"}}>
                      {isSelected?"✓ ":""}{slot}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </Card>

        <Card>
          <h2 style={{fontSize:15,fontWeight:800,marginBottom:14}}>📋 Booking details</h2>
          {!selectedSlot?(
            <div style={{textAlign:"center",padding:"28px 16px",color:"var(--tx5)"}}>
              <div style={{fontSize:32,marginBottom:10}}>📅</div>
              <div style={{fontSize:14,fontWeight:600}}>Select a time slot to book</div>
            </div>
          ):(
            <>
              <div style={{padding:"14px 16px",borderRadius:"var(--r-sm)",background:"#EDFAF6",border:"1.5px solid var(--teal-mid)",marginBottom:14}}>
                <div style={{fontSize:13,color:"var(--tx5)",marginBottom:3}}>Selected slot</div>
                <div style={{fontSize:15,fontWeight:800}}>{selectedSlot.replace("-"," · ")}</div>
                <div style={{fontSize:13.5,color:"var(--teal-h)",marginTop:3}}>{providers.find(p=>p.id===selectedProvider)?.name}</div>
              </div>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"var(--tx3)",marginBottom:5}}>Session type</label>
              <select style={{...iSt,marginBottom:14}} onFocus={iFoc} onBlur={iBlr}>
                <option>Individual therapy (60 min) · CPT 90837</option>
                <option>Individual therapy (45 min) · CPT 90834</option>
                <option>Family therapy (50 min) · CPT 90847</option>
                <option>Initial evaluation (60 min) · CPT 90791</option>
              </select>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"var(--tx3)",marginBottom:5}}>Format</label>
              <select style={{...iSt,marginBottom:16}} onFocus={iFoc} onBlur={iBlr}>
                <option>📹 Telehealth (Zoom)</option>
                <option>🟣 Telehealth (Teams)</option>
                <option>🏢 In-person</option>
              </select>
              {!booked
                ?<Btn v="pri" full sz="lg" onClick={()=>setBooked(true)}>Request appointment →</Btn>
                :<Alert type="success"><strong>Appointment requested!</strong> Provider will confirm within 2 hours. Confirmation sent via email and in-app notification.</Alert>
              }
            </>
          )}
          <HR my={14}/>
          <Alert type="mint" style={{marginTop:4}}>In the full platform, this calendar syncs with provider scheduling systems in real-time. Confirmations trigger automatic SMS and email reminders.</Alert>
        </Card>
      </div>
    </div>
  );
};

// HOME PAGE
// ══════════════════════════════════════════════════════════
const Home=({nav,setRole})=>(
  <div className="pg">
    <div style={{background:"linear-gradient(135deg,#0C7A6A 0%,#0EA5E9 60%,#5B21B6 100%)",borderRadius:"var(--r-lg)",padding:"50px 54px 46px",marginBottom:28,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:-40,top:-40,width:280,height:280,borderRadius:"50%",background:"rgba(255,255,255,.06)"}}/>
      <div style={{position:"relative",zIndex:2}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:7,background:"rgba(255,255,255,.16)",border:"1.5px solid rgba(255,255,255,.28)",borderRadius:99,padding:"5px 15px",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:".08em",color:"white",marginBottom:18}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#6EE7B7"}}/>EPSE Enterprises LLC · Alabama Youth Mental Health Initiative
        </div>
        <h1 style={{fontFamily:"'Lora',serif",fontSize:42,fontWeight:700,color:"white",marginBottom:16,lineHeight:1.12}}>Connecting youth to <em style={{color:"#A7F3D0"}}>care</em><br/>faster than ever before.</h1>
        <p style={{fontSize:16,color:"rgba(255,255,255,.82)",maxWidth:500,marginBottom:30,lineHeight:1.7}}>A secure, HIPAA-informed, consent-aware coordination platform bridging schools, families, licensed providers, and community organizations.</p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:32}}>
          <Btn v="sec" sz="lg" onClick={()=>{setRole("Youth");nav("youth");}}>🌱 Youth Check-In</Btn>
          <Btn sz="lg" onClick={()=>{setRole("School");nav("school");}} style={{background:"rgba(255,255,255,.15)",color:"white",border:"2px solid rgba(255,255,255,.3)"}}>📋 Submit Referral</Btn>
          <Btn sz="lg" onClick={()=>nav("impact")} style={{background:"rgba(255,255,255,.1)",color:"white",border:"2px solid rgba(255,255,255,.2)"}}>💼 Impact Report</Btn>
        </div>
        <div style={{display:"flex",gap:36,paddingTop:24,borderTop:"1px solid rgba(255,255,255,.2)",flexWrap:"wrap"}}>
          {[["4,280","Youth served"],["3.2 days","Time to contact"],["18","Clinical modalities"],["21","EHR criteria"],["127","Partners"]].map(([n,l])=>(<div key={l}><div style={{fontSize:26,fontWeight:900,color:"white",lineHeight:1}}>{n}</div><div style={{fontSize:12,color:"rgba(255,255,255,.65)",marginTop:4}}>{l}</div></div>))}
        </div>
      </div>
    </div>
    <Card sx={{marginBottom:22,background:"#EDFAF6",border:"1.5px solid var(--teal-mid)"}}>
      <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
        <div style={{fontSize:40,flexShrink:0}}>🏢</div>
        <div>
          <div style={{fontSize:17,fontWeight:900,color:"var(--teal-h)",marginBottom:6}}>EPSE Enterprises LLC</div>
          <p style={{fontSize:14.5,color:"var(--tx3)",lineHeight:1.7,marginBottom:10}}>Birmingham, Alabama-based social enterprise developing technology for youth behavioral health, education equity, and community safety. E-Connect Youth is EPSE's flagship platform — patent-pending (Application No. 63875629). Built to eliminate fragmentation in care delivery for underserved youth ages 10–21.</p>
          <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
            <Badge v="teal">📍 Birmingham, Alabama</Badge><Badge v="blue">Patent App. 63875629</Badge><Badge v="green">HIPAA-Informed</Badge><Badge v="purple">FERPA-Aware</Badge>
            <a href="https://www.epse2021.org" target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 11px",borderRadius:99,fontSize:13,fontWeight:800,background:"#C9F5EC",color:"#0A5E52",textDecoration:"none"}}>🌐 epse2021.org</a>
          </div>
        </div>
      </div>
    </Card>
    <SH title="Choose your portal" sub="Select the role that matches you to get started" mb={16}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:12,marginBottom:26}}>
      {[{e:"🌱",t:"Youth & Teen",d:"Check-ins, journaling, 12 coping activities",role:"Youth",page:"youth",bg:"#EDFAF6",bdr:"#4DB8A4",tc:"#0C7A6A"},{e:"📓",t:"Journaling",d:"18 therapeutic modalities + mood tracking",role:"Youth",page:"journal",bg:"#F0FDF9",bdr:"#6EE7B7",tc:"#047857"},{e:"🏡",t:"Parent Portal",d:"Support requests, consent, referral tracking",role:"Parent",page:"parent",bg:"#EFF6FF",bdr:"#93C5FD",tc:"#1D4ED8"},{e:"🏫",t:"School Counselor",d:"FERPA-aware referral submission",role:"School",page:"school",bg:"#FFFBEB",bdr:"#FCD34D",tc:"#92400E"},{e:"🩺",t:"Provider",d:"Referrals, CSSR screenings, caseload",role:"Provider",page:"provider",bg:"#ECFDF5",bdr:"#6EE7B7",tc:"#047857"},{e:"🔗",t:"Care Coordinator",d:"Case management, matching, analytics",role:"Admin",page:"coordinator",bg:"#F5F3FF",bdr:"#C4B5FD",tc:"#5B21B6"},{e:"🧪",t:"CSSR Screening",d:"Columbia Suicide Severity Rating Scale",role:"Provider",page:"cssrs",bg:"#FFF5F5",bdr:"#FCA5A5",tc:"#B91C1C"},{e:"🛡️",t:"Safety Plan",d:"Co-build personalized safety plans",role:"Youth",page:"safety",bg:"#ECFDF5",bdr:"#6EE7B7",tc:"#047857"},{e:"👩‍⚕️",t:"Provider Matching",d:"AI-assisted provider profiles and selection",role:"Admin",page:"providers",bg:"#EFF6FF",bdr:"#93C5FD",tc:"#1D4ED8"},{e:"💼",t:"Impact Report",d:"Funder & investor-ready analytics",role:"Admin",page:"impact",bg:"var(--bg)",bdr:"var(--bdr)",tc:"var(--tx2)"}].map(p=>(
        <Card key={p.t} sx={{background:p.bg,border:`2px solid ${p.bdr}`,textAlign:"center",padding:"16px 12px",cursor:"pointer"}} onClick={()=>{setRole(p.role);nav(p.page);}}>
          <div style={{fontSize:26,marginBottom:8}}>{p.e}</div>

  </div>
);

// ══════════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════════
function App(){
  const[page,setPage]=useState("home");
  const[role,setRole]=useState("Admin");
  const[dark,setDark]=useState(false);
  const[showOnboarding,setShowOnboarding]=useState(true);
  const[disclaimerAccepted,setDisclaimerAccepted]=useState(false);
  const[showSearch,setShowSearch]=useState(false);
  const[showNotifs,setShowNotifs]=useState(false);
  const[collapsed,setCollapsed]=useState(false);
  const[lang,setLang]=useState("en");
  const[simpleMode,setSimpleMode]=useState(false);
  const mainRef=useRef(null);

  useEffect(()=>{
    if(dark){document.body.classList.add("dark");}else{document.body.classList.remove("dark");}
  },[dark]);

  useEffect(()=>{
    const handler=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setShowSearch(s=>!s);}
      if(e.key==="Escape"){setShowSearch(false);setShowNotifs(false);}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  const nav=p=>{setPage(p);if(mainRef.current)mainRef.current.scrollTop=0;};
  const roleDefaults={Youth:"youth",Parent:"parent",School:"school",Provider:"provider",Admin:"coordinator"};
  const setRoleNav=r=>{setRole(r);setShowOnboarding(true);nav(roleDefaults[r]||"home");};

  const routes={
    home:<Home nav={nav} setRole={setRoleNav}/>,
    youth:<YouthDash nav={nav}/>,
    journal:<JournalPage/>,
    mood:<MoodHistoryPage/>,
    parent:<ParentDash nav={nav}/>,
    school:<SchoolForm/>,
    provider:<ProviderDash nav={nav}/>,
    coordinator:<CoordDash nav={nav}/>,
    cssrs:<CSSRSPage/>,
    trauma:<TraumaPage/>,
    safety:<SafetyPlanPage/>,
    treatment:<TreatmentPlanPage/>,
    notes:<SessionNotesPage/>,
    screening:<MoreScreeningsPage/>,
    providers:<ProviderMatchingPage/>,
    messages:<FamilyMessagesPage/>,
    progress:<ProgressPage/>,
    ehr:<EHRPage/>,
    consent:<ConsentPage/>,
    tracker:<TrackerPage/>,
    resources:<CrisisPage/>,
    appointments:<ApptPage/>,
    telehealth:<TelehealthPage/>,
    school_dash:<SchoolDistrictPage/>,
    analytics:<AnalyticsPage/>,
    impact:<ImpactReportPage/>,
    caregiver_tips:<CaregiverTipsPage/>,
    quick_referral:<QuickReferralPage/>,
    calendar:<AvailabilityCalendarPage/>,
  };

  return(
    <>
      {!disclaimerAccepted&&(
        <DisclaimerModal onAccept={()=>setDisclaimerAccepted(true)}/>
      )}
      {showOnboarding&&page!=="home"&&disclaimerAccepted&&(
        <OnboardingModal role={role} onClose={()=>setShowOnboarding(false)}/>
      )}
      {showSearch&&<GlobalSearch nav={(p)=>{nav(p);}} onClose={()=>setShowSearch(false)}/>}
      {showNotifs&&<NotificationsPanel nav={(p)=>{nav(p);setShowNotifs(false);}} onClose={()=>setShowNotifs(false)}/>}
      <div className="app-shell" style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
        <Sidebar page={page} nav={nav} role={role} dark={dark} setDark={setDark} collapsed={collapsed} setCollapsed={setCollapsed} onSearch={()=>setShowSearch(true)}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          <RoleBar role={role} setRole={setRoleNav} nav={nav} onNotif={()=>setShowNotifs(s=>!s)} lang={lang} setLang={setLang} simpleMode={simpleMode} setSimpleMode={setSimpleMode}/>
          {/* Breadcrumb */}
          <Breadcrumb page={page} nav={nav}/>
          {/* Language + Accessibility bar */}
          {(lang==="es"||simpleMode)&&(
            <div style={{background:"#FFFBEB",borderBottom:"1px solid #FCD34D",padding:"7px 28px",display:"flex",alignItems:"center",gap:16,fontSize:13,color:"#92400E",flexShrink:0}}>
              {lang==="es"&&<span>🌐 <strong>Modo español activo</strong> — Traducción de demostración. En la plataforma completa, todo el contenido estará completamente traducido.</span>}
              {simpleMode&&<span>📖 <strong>Simple reading mode active</strong> — Language simplified for accessibility.</span>}
              <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                {lang==="es"&&<button onClick={()=>setLang("en")} style={{background:"none",border:"1px solid #FCD34D",borderRadius:"var(--r-xs)",padding:"3px 10px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#92400E",fontFamily:"inherit"}}>Back to English</button>}
                {simpleMode&&<button onClick={()=>setSimpleMode(false)} style={{background:"none",border:"1px solid #FCD34D",borderRadius:"var(--r-xs)",padding:"3px 10px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#92400E",fontFamily:"inherit"}}>Turn off simple mode</button>}
              </div>
            </div>
          )}
          <main className="main-area" ref={mainRef} id="main-content" style={{flex:1,overflowY:"auto",padding:"28px 32px",background:"var(--bg)"}} tabIndex={-1} aria-label="Page content">
            {routes[page]||routes.home}
          </main>
        </div>
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
