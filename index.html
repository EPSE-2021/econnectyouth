<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — loaded before app to prevent FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Lora:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Primary meta -->
    <title>E-Connect Youth — Mental Health Coordination</title>
    <meta
      name="description"
      content="E-Connect Youth is a secure, consent-aware coordination platform connecting schools, families, providers, and community organizations for youth mental health referrals. Prototype — all data is fictional."
    />

    <!-- Open Graph -->
    <meta property="og:title"       content="E-Connect Youth — Mental Health Coordination" />
    <meta property="og:description" content="Secure youth mental health referral coordination platform. Prototype." />
    <meta property="og:type"        content="website" />

    <!-- Accessibility: tell screen readers the language -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Prototype disclaimer -->
    <meta name="robots" content="noindex,nofollow" />

    <style>
      /* Prevent flash of unstyled content */
      html { background: #F7FAFC; }
      body { margin: 0; font-family: 'Nunito', system-ui, sans-serif; }
      #root { min-height: 100vh; }

      /* Loading state before React hydrates */
      #loading {
        position: fixed; inset: 0; display: flex;
        align-items: center; justify-content: center;
        background: #F7FAFC; z-index: 9999;
        transition: opacity .3s;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loading-inner { text-align: center; }
      #loading-logo {
        width: 52px; height: 52px; border-radius: 14px;
        background: linear-gradient(135deg, #0C7A6A, #1D4ED8);
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; margin: 0 auto 16px;
        box-shadow: 0 4px 16px rgba(12,122,106,.3);
      }
      #loading-text {
        font-size: 17px; font-weight: 800; color: #0C7A6A;
        letter-spacing: .01em;
      }
      #loading-sub {
        font-size: 13px; color: #6B7280; margin-top: 4px; font-weight: 500;
      }
    </style>
  </head>

  <body>
    <!-- Loading screen removed once React mounts -->
    <div id="loading" aria-hidden="true">
      <div id="loading-inner">
        <div id="loading-logo">🔗</div>
        <div id="loading-text">E-Connect Youth</div>
        <div id="loading-sub">Mental Health Coordination · Loading…</div>
      </div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <!-- Entry point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide loading screen once JS runs -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // React will mount shortly; fade out loading screen
        setTimeout(() => {
          const el = document.getElementById('loading');
          if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 350); }
        }, 200);
      });
    </script>
  </body>
</html>
